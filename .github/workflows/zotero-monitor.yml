name: Legal CDR Zotero Monitor

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:
    inputs:
      setup_only:
        description: "Criar somente a estrutura de coleções"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Pesquisar sem adicionar publicações"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: legal-cdr-zotero-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
      ZOTERO_GROUP_ID: "6614701"
      CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
      LOOKBACK_DAYS: "120"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Localizar projeto
        shell: bash
        run: |
          PROJECT_DIR="$(dirname "$(find . -name monitor.py -type f -print -quit)")"
          test -f "$PROJECT_DIR/monitor.py"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Validar configurações
        run: |
          cd "$PROJECT_DIR"
          python -m json.tool config/collections.json >/dev/null
          python -m json.tool config/queries.json >/dev/null

      - name: Criar estrutura de coleções
        if: ${{ inputs.setup_only == true }}
        run: |
          cd "$PROJECT_DIR"
          python monitor.py --setup

      - name: Procurar e atualizar o Zotero
        if: ${{ inputs.setup_only != true }}
        run: |
          cd "$PROJECT_DIR"
          python monitor.py ${{ inputs.dry_run == true && '--dry-run' || '' }}
